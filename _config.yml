# =========================================================
# Ruthwell Cross — site settings
# =========================================================
# Part of the Visionary Cross Project. This repository holds the
# Ruthwell Cross site: the 3DHOP viewer, its pages, panels, and models.

title: Ruthwell Cross
email: humanitiesinnovationlab@gmail.com
description: >-
  A digital edition of the Ruthwell Cross, with an interactive 3D model
  and panel-by-panel iconographic commentary.

# baseurl: the subpath this project site is served from, so that any links
# using relative_url resolve to /ruthwell instead of the domain root (which
# belongs to the user-page repo). The 3DHOP content pages use plain relative
# paths (../../assets/css/main.css) and work regardless, but this keeps the
# Jekyll setup identical to the hub. Local `jekyll serve` previews at
# http://localhost:4000/ruthwell/.
baseurl: ""
# url: the base hostname & protocol for the published site.
url: "https://visionary-cross-project.github.io"

# remote_theme: pull the shared chrome and styling from the hub repo
# (the user-page site) instead of duplicating them here. At build time Jekyll
# fetches the hub's _layouts, _includes, and _sass partials, and compiles its
# assets/css/main.scss into this site's /assets/css/main.css. Edit the styles
# once, in visionary-cross-project.github.io, and every cross site picks them
# up on its next build. Any same-named file committed here would override the
# theme's copy, so this repo deliberately keeps no local style sources.
remote_theme: visionary-cross-project/visionary-cross-project.github.io

# Per-cross links for the shared nav (from the remote theme), and the shared
# header below. Each cross is a project site under this same domain.
crosses:
  ruthwell: "/ruthwell"
  bewcastle: "/bewcastle"
  brussels: "/brussels"

# Shared header (rendered by the theme's _includes/header.html). header_image is
# baseurl-relative, so it resolves to /ruthwell/assets/img/head.jpg.
header_title: "Ruthwell"
header_image: "/assets/img/head.jpg"

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-remote-theme

# Sass: partials and assets/css/main.scss now live in the remote theme.
# "expanded" keeps the generated CSS readable; use "compressed" to minify.
sass:
  style: expanded

# Exclude from processing.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - README.md
